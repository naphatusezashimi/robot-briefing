<!DOCTYPE html>
<!--
  MOCKUP (ดีไซน์อย่างเดียว ยังไม่ต่อเสียง/AI) — จอ "ใบหน้า" ของหุ่นกล่องพูดได้
  วิทยาลัยเทคนิคท่าหลวงซิเมนต์ไทยอนุสรณ์
  เปิดไฟล์นี้คู่กับ screen.html ในเบราว์เซอร์เดียว สถานะจะ sync กัน
-->
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หุ่นยนต์ — จอใบหน้า (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#BFE6FF; --glow:#7FCBFF; --label:"พร้อมรับคำถาม";
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Mitr",system-ui,sans-serif;
    background:
      radial-gradient(120% 90% at 50% 30%, #11203a 0%, #0a1426 45%, #050a16 100%);
    color:#eaf4ff; overflow:hidden; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:background .6s ease;
  }
  /* แสง ambient ด้านหลัง เปลี่ยนสีตามอารมณ์ */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(50% 40% at 50% 42%, color-mix(in srgb, var(--glow) 28%, transparent), transparent 70%);
    transition:background .6s ease; opacity:.9;
  }
  /* scanline + vignette ให้รู้สึกเป็นจออุปกรณ์ */
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 3px),
      radial-gradient(130% 130% at 50% 50%, transparent 58%, rgba(0,0,0,.55) 100%);
    mix-blend-mode:overlay;
  }

  .stage{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:46px}

  .face{position:relative; animation:float 6s ease-in-out infinite; display:flex; flex-direction:column; align-items:center; gap:34px}
  /* วงพลังงานรอบหน้า (เด่นตอนฟัง) */
  .face::before{
    content:""; position:absolute; top:42%; left:50%; width:440px; height:440px;
    transform:translate(-50%,-50%) scale(.6); border-radius:50%;
    border:2px solid color-mix(in srgb, var(--glow) 60%, transparent);
    opacity:0; transition:opacity .4s;
  }

  .eyes{display:flex; gap:64px}
  .eye{transition:transform .45s cubic-bezier(.34,1.4,.5,1)}
  .eye-ball{
    width:104px; height:122px; border-radius:34px; position:relative;
    background:radial-gradient(120% 90% at 40% 28%,
      color-mix(in srgb, var(--accent) 96%, #fff 40%), var(--accent) 62%,
      color-mix(in srgb, var(--accent) 70%, #1c3a66) 100%);
    box-shadow:
      0 0 26px var(--glow),
      0 0 70px color-mix(in srgb, var(--glow) 65%, transparent),
      inset 0 -14px 26px color-mix(in srgb, var(--glow) 45%, transparent);
    animation:blink 5.4s infinite;
    transition:height .45s cubic-bezier(.34,1.4,.5,1), border-radius .45s, background .6s, box-shadow .6s;
  }
  .eye-ball::after{ /* ประกายตา */
    content:""; position:absolute; top:16px; left:20px; width:34px; height:30px;
    border-radius:50%; background:rgba(255,255,255,.9); filter:blur(2px); opacity:.85;
  }

  .mouth{margin-top:4px; transition:all .45s ease; filter:drop-shadow(0 0 10px var(--glow))}

  .status{
    position:relative; z-index:2; display:flex; align-items:center; gap:12px;
    font-size:1.45rem; font-weight:300; letter-spacing:.5px; color:#dcebff;
  }
  .status .dot{width:14px;height:14px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 14px var(--glow); animation:pulse 1.8s infinite}
  .status .bars{display:none; gap:5px; align-items:flex-end; height:22px}
  .status .bars i{width:5px;height:8px;border-radius:3px;background:var(--accent);
    box-shadow:0 0 8px var(--glow); animation:eq .9s ease-in-out infinite}
  .status .bars i:nth-child(2){animation-delay:.15s}
  .status .bars i:nth-child(3){animation-delay:.3s}
  .status .bars i:nth-child(4){animation-delay:.45s}
  .status .bars i:nth-child(5){animation-delay:.6s}
  .status .think{display:none; gap:7px}
  .status .think i{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 8px var(--glow); animation:think 1.4s infinite}
  .status .think i:nth-child(2){animation-delay:.2s}
  .status .think i:nth-child(3){animation-delay:.4s}

  /* ---------- ม้วนแต่ละสถานะ ---------- */
  /* รอ (ขาว/ฟ้าอ่อน) — ยิ้มเบาๆ */
  body.state-idle{--accent:#CFEBFF;--glow:#86CEFF}
  body.state-idle .mouth{width:96px;height:46px;border:8px solid var(--accent);border-top:0;border-radius:0 0 96px 96px}

  /* ฟัง (ฟ้า) — ตาเบิ่ง วงพลังงานเต้น */
  body.state-listening{--accent:#43A9FF;--glow:#2C8FF0}
  body.state-listening .eye-ball{height:134px}
  body.state-listening .mouth{width:48px;height:8px;border-radius:8px;background:var(--accent)}
  body.state-listening .face::before{opacity:1; animation:ring 1.8s ease-out infinite}
  body.state-listening .status .bars{display:flex}

  /* คิด (เหลือง) — ตากลอกขึ้น จุดวิ่ง */
  body.state-thinking{--accent:#FFC850;--glow:#FFB020}
  body.state-thinking .eye{transform:translateY(-24px)}
  body.state-thinking .eye-ball{height:104px}
  body.state-thinking .mouth{width:40px;height:8px;border-radius:8px;background:var(--accent)}
  body.state-thinking .status .think{display:flex}

  /* ตอบ (เขียว) — ตายิ้ม ปากขยับ */
  body.state-answering{--accent:#41DC9B;--glow:#1FC07E}
  body.state-answering .eye-ball{height:50px;border-radius:42px 42px 30px 30px;animation:none}
  body.state-answering .mouth{width:74px;height:42px;border-radius:48%;background:var(--accent);animation:talk .42s ease-in-out infinite}

  /* ผิดพลาด (แดง) — ตาเศร้า ปากคว่ำ สั่นเบาๆ */
  body.state-error{--accent:#FF6B7A;--glow:#FF4757}
  body.state-error .face{animation:float 6s ease-in-out infinite, shake .5s ease 1}
  body.state-error .eye-ball{height:78px;animation:none}
  body.state-error .eye.left{transform:rotate(-15deg)}
  body.state-error .eye.right{transform:rotate(15deg)}
  body.state-error .mouth{width:84px;height:40px;border:8px solid var(--accent);border-bottom:0;border-radius:96px 96px 0 0}

  /* ---------- animations ---------- */
  @keyframes blink{0%,93%,100%{transform:scaleY(1)}96.5%{transform:scaleY(.08)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.6);opacity:.5}}
  @keyframes talk{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
  @keyframes eq{0%,100%{height:8px}50%{height:22px}}
  @keyframes think{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-7px);opacity:1}}
  @keyframes ring{0%{transform:translate(-50%,-50%) scale(.6);opacity:.9}100%{transform:translate(-50%,-50%) scale(1.25);opacity:0}}
  @keyframes shake{0%,100%{margin-left:0}20%{margin-left:-12px}40%{margin-left:12px}60%{margin-left:-8px}80%{margin-left:8px}}

  /* แผง preview (เฉพาะ mockup) */
  .demo{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:18px;
    background:rgba(12,22,40,.72);backdrop-filter:blur(10px);
    border:1px solid rgba(120,180,255,.18);box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .demo b{font-size:.78rem;font-weight:500;color:#8fb6e6;margin-right:4px;white-space:nowrap}
  .demo button{font-family:inherit;font-size:.82rem;color:#dcebff;cursor:pointer;
    padding:7px 13px;border-radius:11px;border:1px solid rgba(120,180,255,.2);
    background:rgba(255,255,255,.04);transition:.2s}
  .demo button:hover{background:rgba(120,180,255,.18)}
  .demo button.on{background:var(--accent);color:#06101f;border-color:transparent;font-weight:500}
  .hint{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:.72rem;color:#5f7ba6;letter-spacing:.4px}
</style>
</head>
<body class="page-face state-idle">
  <div class="stage">
    <div class="face">
      <div class="eyes">
        <div class="eye left"><div class="eye-ball"></div></div>
        <div class="eye right"><div class="eye-ball"></div></div>
      </div>
      <div class="mouth"></div>
    </div>

    <div class="status">
      <span class="dot"></span>
      <span class="bars"><i></i><i></i><i></i><i></i><i></i></span>
      <span class="think"><i></i><i></i><i></i></span>
      <span class="status-text">พร้อมรับคำถาม</span>
    </div>
  </div>

<script src="/static/face.js"></script>
</body>
</html>
