<!DOCTYPE html>
<!--
  MOCKUP (ดีไซน์อย่างเดียว ยังไม่ต่อเสียง/AI จริง) — จอ "เนื้อหา" ของหุ่นกล่องพูดได้
  วิทยาลัยเทคนิคท่าหลวงซิเมนต์ไทยอนุสรณ์
  คำตอบในนี้เป็นตัวอย่างที่เขียนไว้ก่อน (ของจริงจะมาจาก ai.py + college_data.json)
  เปิดคู่กับ face.html ในเบราว์เซอร์เดียว สถานะจะ sync กัน
-->
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หุ่นยนต์ — จอเนื้อหา (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2A9DF4; --blue-d:#1B7FD4; --cyan:#54CBFF;
    --ink:#15273d; --muted:#6b819e;
    --led:#9bb3cf; /* สีไฟตามสถานะ */
    --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"IBM Plex Sans Thai",system-ui,sans-serif; color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:22px;
    background:
      radial-gradient(60% 50% at 18% 12%, #d7ecff 0%, transparent 60%),
      radial-gradient(55% 45% at 88% 18%, #e7e0ff 0%, transparent 55%),
      radial-gradient(70% 60% at 50% 110%, #cfe6ff 0%, transparent 60%),
      #eef4fc;
  }
  body::before{ /* พื้นจุดบางๆ */
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(42,157,244,.10) 1.1px, transparent 1.1px);
    background-size:24px 24px; mask:radial-gradient(80% 80% at 50% 50%,#000,transparent);
  }

  .device{
    position:relative; z-index:2; width:min(94vw,470px); height:min(92vh,780px);
    background:linear-gradient(180deg,#fbfdff,#f3f8ff);
    border-radius:34px; overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 40px 90px -30px rgba(20,60,120,.45), 0 0 0 1px rgba(255,255,255,.8) inset;
  }
  .accent-line{height:5px;background:var(--led);transition:background .5s; flex:none}

  /* ---------- header ---------- */
  header{padding:18px 22px 14px; display:flex; align-items:center; gap:13px;
    border-bottom:1px solid #e7eefb; flex:none}
  .logo{width:48px;height:48px;border-radius:14px;flex:none; display:grid;place-items:center;
    background:#fff; border:1px solid #e7eefb;
    box-shadow:0 8px 18px -6px rgba(20,60,120,.18)}
  .brand{flex:1;min-width:0}
  .brand h1{font-family:"Mitr";font-weight:500;font-size:.9rem;line-height:1.2;color:#13243b;text-wrap:balance}
  .brand p{font-size:.72rem;color:var(--muted);margin-top:2px}
  .led{margin-left:auto; display:flex;align-items:center;gap:6px; padding:5px 9px;
    background:#f1f6fe;border-radius:999px;border:1px solid #e2ecfb;white-space:nowrap}
  .led .d{width:9px;height:9px;border-radius:50%;background:var(--led);transition:background .4s;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--led) 25%,transparent)}
  .led .d.live{animation:lpulse 1.4s infinite}
  .led span{font-size:.68rem;color:#46618a;font-weight:500}

  /* ---------- chat ---------- */
  .chat{flex:1; overflow-y:auto; padding:20px 18px 8px; display:flex;flex-direction:column;gap:14px}
  .chat::-webkit-scrollbar{width:7px}.chat::-webkit-scrollbar-thumb{background:#cfdcf0;border-radius:9px}
  .msg{display:flex;gap:9px;max-width:88%; animation:rise .5s both}
  .msg.bot{align-self:flex-start}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .ava{width:34px;height:34px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;gap:5px;
    background:radial-gradient(120% 100% at 50% 25%,#16304f,#0a1a2e); box-shadow:0 4px 10px -3px rgba(10,30,60,.5)}
  .ava i{width:7px;height:11px;border-radius:3px;background:var(--cyan);box-shadow:0 0 7px var(--cyan)}
  .bubble{padding:11px 15px;border-radius:18px;font-size:.94rem;line-height:1.5}
  .bot .bubble{background:var(--card);border:1px solid #e9f0fb;border-top-left-radius:6px;
    box-shadow:0 8px 22px -14px rgba(20,60,120,.4);color:#22384f}
  .user .bubble{background:linear-gradient(145deg,var(--blue),var(--blue-d));color:#fff;border-top-right-radius:6px;
    box-shadow:0 10px 22px -10px rgba(42,157,244,.6)}
  .user .bubble .mic-tag{font-size:.7rem;opacity:.8;display:block;margin-bottom:2px}
  .bubble.warn{border-left:3px solid #F5A623}
  .typing .bubble{display:flex;gap:5px;padding:14px 16px}
  .typing .bubble i{width:8px;height:8px;border-radius:50%;background:#9fb6d4;animation:think 1.4s infinite}
  .typing .bubble i:nth-child(2){animation-delay:.2s}.typing .bubble i:nth-child(3){animation-delay:.4s}

  /* ---------- dock ---------- */
  .dock{flex:none;padding:14px 20px 20px;border-top:1px solid #e7eefb;
    background:linear-gradient(180deg,#ffffff,#f6faff); text-align:center}
  .mic{position:relative;width:78px;height:78px;border-radius:50%;border:0;cursor:pointer;margin:2px auto 6px;
    display:grid;place-items:center; background:linear-gradient(145deg,var(--blue),var(--blue-d));
    box-shadow:0 14px 30px -10px rgba(42,157,244,.7); transition:transform .2s}
  .mic:hover{transform:translateY(-2px)}
  .mic svg{width:32px;height:32px;fill:#fff}
  .mic::after{content:"";position:absolute;inset:-6px;border-radius:50%;
    border:2px solid var(--blue);opacity:.55;animation:invite 2.2s ease-out infinite}
  .mic.live{background:linear-gradient(145deg,#ff7a8a,#ff5566)}
  .mic.live::after{border-color:#ff5566;animation:invite 1s ease-out infinite}
  .mic-label{font-family:"Mitr";font-weight:400;font-size:.92rem;color:#2b4565}
  .or{display:flex;align-items:center;gap:10px;color:#9fb1c9;font-size:.74rem;margin:12px 4px 10px}
  .or::before,.or::after{content:"";flex:1;height:1px;background:#e3ebf7}
  .composer{display:flex;gap:8px}
  .composer input{flex:1;padding:11px 16px;border-radius:14px;border:1px solid #dde7f6;
    font-family:inherit;font-size:.9rem;color:var(--ink);background:#fff;outline:none;transition:.2s}
  .composer input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,157,244,.15)}
  .composer button{width:46px;border:0;border-radius:14px;cursor:pointer;flex:none;
    background:#eaf2fe;color:var(--blue);font-size:1.2rem;transition:.2s}
  .composer button:hover{background:var(--blue);color:#fff}

  /* ---------- คำถามยอดนิยม (แตะเพื่อถามทันที) ---------- */
  .quick{margin:0 2px 12px}
  .quick-label{font-size:.72rem;color:#9fb1c9;margin-bottom:7px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .chip{font-family:inherit;font-size:.8rem;color:#2b4565;background:#fff;
    border:1px solid #dde7f6;border-radius:999px;padding:7px 13px;cursor:pointer;
    transition:.2s;box-shadow:0 4px 10px -7px rgba(20,60,120,.35)}
  .chip:hover{background:var(--blue);border-color:var(--blue);color:#fff;transform:translateY(-1px)}
  .chip:active{transform:none}

  /* ---------- map thumbnail & lightbox ---------- */
  .map-thumb{display:block;width:100%;max-width:320px;border-radius:10px;margin-top:8px;
    cursor:zoom-in;border:1px solid #e0eaf6;box-shadow:0 4px 14px -6px rgba(20,60,120,.3)}
  #lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);
    align-items:center;justify-content:center;cursor:zoom-out}
  #lightbox.open{display:flex}
  #lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain;
    box-shadow:0 20px 60px -10px rgba(0,0,0,.7)}

  /* แผง preview (เฉพาะ mockup) */
  .demo{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:20;
    display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:16px;
    background:rgba(255,255,255,.85);backdrop-filter:blur(8px);
    border:1px solid #dce7f7;box-shadow:0 12px 34px -12px rgba(20,60,120,.4)}
  .demo b{font-size:.72rem;color:#7c93b3;font-weight:600;white-space:nowrap}
  .demo button{font-family:inherit;font-size:.78rem;color:#3a577d;cursor:pointer;
    padding:6px 11px;border-radius:10px;border:1px solid #e0e9f7;background:#fff;transition:.2s}
  .demo button:hover{background:#eef4fe}
  .demo button.on{background:var(--blue);color:#fff;border-color:transparent}
  .tag{position:fixed;top:12px;left:14px;z-index:20;font-size:.7rem;color:#9fb1c9;letter-spacing:.3px}

  /* states */
  body.state-idle{--led:#9bb3cf}
  body.state-listening{--led:#2A9DF4}
  body.state-thinking{--led:#F5A623}
  body.state-answering{--led:#2BB673}
  body.state-error{--led:#EB5757}

  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes think{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}
  @keyframes invite{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.5);opacity:0}}
  @keyframes lpulse{0%,100%{box-shadow:0 0 0 3px color-mix(in srgb,var(--led) 25%,transparent)}50%{box-shadow:0 0 0 7px color-mix(in srgb,var(--led) 10%,transparent)}}
</style>
</head>
<body class="page-screen state-idle">
  <div class="device">
    <div class="accent-line"></div>

    <header>
      <div class="logo">
        <img src="/static/logo.jpg" alt="ตราวิทยาลัยเทคนิคท่าหลวงซิเมนต์ไทยอนุสรณ์" width="40" height="40" style="object-fit:contain">
      </div>
      <div class="brand">
        <h1>วิทยาลัยเทคนิคท่าหลวงฯ</h1>
        <p>ผู้ช่วยอัจฉริยะ • ถามข้อมูลวิทยาลัยได้เลย</p>
      </div>
      <div class="led"><span class="d"></span><span class="led-text">พร้อมรับคำถาม</span></div>
    </header>

    <main class="chat" id="chat">
      <div class="msg bot" style="animation-delay:.1s">
        <div class="ava"><i></i><i></i></div>
        <div class="bubble">สวัสดีค่ะ 😊 ฉันคือผู้ช่วยแนะนำข้อมูล<b>วิทยาลัยเทคนิคท่าหลวงซิเมนต์ไทยอนุสรณ์</b> อยากทราบเรื่องอะไร พูดหรือพิมพ์ถามได้เลยนะคะ</div>
      </div>
    </main>

    <div class="dock">
      <button class="mic" id="mic" title="กดเพื่อพูด">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-3.1A7 7 0 0 0 19 11h-2z"/></svg>
      </button>
      <div class="mic-label" id="micLabel">กดเพื่อพูด</div>
      <div class="or">หรือ</div>
      <div class="quick" id="quickQs">
        <div class="quick-label">คำถามยอดนิยม — แตะถามได้เลย</div>
        <div class="chips">
          <button type="button" class="chip" data-action="showMap">🗺️ แผนผังวิทยาลัย</button>
          <button type="button" class="chip">เปิดสอนสาขาอะไรบ้าง</button>
          <button type="button" class="chip">สมัครเรียนต้องมีคุณสมบัติอะไร</button>
          <button type="button" class="chip">ค่าเทอมเท่าไหร่</button>
        </div>
      </div>
      <form class="composer" id="composer">
        <input id="q" placeholder="พิมพ์คำถามที่นี่…" autocomplete="off">
        <button type="submit" title="ส่ง">↑</button>
      </form>
    </div>
  </div>

<div id="lightbox"><img src="" alt="แผนผังวิทยาลัยขยาย"></div>
<script src="/static/screen.js"></script>
</body>
</html>
